name: "📊 Compare AI vs Human Scans"

on:
  workflow_dispatch: 
  workflow_run:
    workflows: ["General AI Multi-Language Scanner", "Human PR CodeQL Scanner"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  compare:
    name: Generate Comparison & Trend
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - uses: actions/checkout@v4

      - name: Get Latest Run Details
        id: runs
        run: |
          # Fetch AI and Human run metadata
          AI_DATA=$(gh run list --workflow "General AI Multi-Language Scanner" --status success --limit 1 --json databaseId,createdAt --jq '.')
          HU_DATA=$(gh run list --workflow "Human PR CodeQL Scanner" --status success --limit 1 --json databaseId,createdAt --jq '.')
          
          echo "ai_run_id=$(echo $AI_DATA | jq -r .databaseId)" >> $GITHUB_OUTPUT
          echo "ai_time_utc=$(echo $AI_DATA | jq -r .createdAt)" >> $GITHUB_OUTPUT
          echo "hu_run_id=$(echo $HU_DATA | jq -r .databaseId)" >> $GITHUB_OUTPUT
          echo "hu_time_utc=$(echo $HU_DATA | jq -r .createdAt)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download All Results
        run: |
          mkdir -p ai-results human-results
          gh run download ${{ steps.runs.outputs.ai_run_id }} -D ai-results || true
          gh run download ${{ steps.runs.outputs.hu_run_id }} -D human-results || true
          
          echo "AI Files: $(find ai-results -name '*.sarif' | wc -l)"
          echo "Human Files: $(find human-results -name '*.sarif' | wc -l)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Comparison Dashboard
        run: |
          # Ensure pytz is available for timezone conversion
          pip install pytz
          
          python3 -c "
          import json, glob, os, pytz
          from datetime import datetime

          def to_ct(iso_str):
              try:
                  utc_dt = datetime.strptime(iso_str, '%Y-%m-%dT%H:%M:%SZ').replace(tzinfo=pytz.utc)
                  return utc_dt.astimezone(pytz.timezone('US/Central')).strftime('%Y-%m-%d %I:%M:%S %p CT')
              except: return iso_str

          def get_stats(base_dir):
              search_path = os.path.join(base_dir, '**', '*.sarif')
              files = glob.glob(search_path, recursive=True)
              total_prs, total_issues = 0, 0
              sevs = {'error': 0, 'warning': 0, 'note': 0}
              
              for f in files:
                  if os.path.basename(f) == 'results.sarif': continue
                  try:
                      with open(f) as s:
                          data = json.load(s)
                          runs = data.get('runs', [])
                          if not runs: continue
                          total_prs += 1
                          for run in runs:
                              res = run.get('results', [])
                              total_issues += len(res)
                              for r in res:
                                  lv = r.get('level', 'warning')
                                  sevs[lv] = sevs.get(lv, 0) + 1
                  except: pass
              return total_prs, total_issues, sevs

          ai_prs, ai_issues, ai_sevs = get_stats('ai-results')
          hu_prs, hu_issues, hu_sevs = get_stats('human-results')

          def dens(iss, prs): return round(iss/prs, 2) if prs > 0 else 0
          ai_d, hu_d = dens(ai_issues, ai_prs), dens(hu_issues, hu_prs)

          print('# ⚖️ AI vs. Human Vulnerability Comparison')
          print(f'\n### 🕒 Data Freshness (Central Time)')
          print(f'- **AI Scan Run:** `{to_ct(\"${{ steps.runs.outputs.ai_time_utc }}\")}`')
          print(f'- **Human Scan Run:** `{to_ct(\"${{ steps.runs.outputs.hu_time_utc }}\")}`')

          print('\n### 📊 Executive Metrics')
          print(f'| Metric | AI-Generated | Human-Written | Status |')
          print(f'| :--- | :--- | :--- | :--- |')
          print(f'| **Total PRs** | {ai_prs} | {hu_prs} | - |')
          print(f'| **Issues Found** | {ai_issues} | {hu_issues} | - |')
          status = '⚠️ AI density is higher' if ai_d > hu_d else '✅ AI density is lower'
          print(f'| **Density** | **{ai_d}** issues/PR | **{hu_d}** issues/PR | {status} |')

          print('\n### 🔴 Severity Breakdown')
          print(f'| Severity | AI Count | Human Count |')
          print(f'| :--- | :--- | :--- |')
          print(f'| High (Error) | {ai_sevs.get(\"error\", 0)} | {hu_sevs.get(\"error\", 0)} |')
          print(f'| Medium (Warning) | {ai_sevs.get(\"warning\", 0)} | {hu_sevs.get(\"warning\", 0)} |')
          " >> $GITHUB_STEP_SUMMARY
