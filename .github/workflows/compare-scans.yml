name: "📊 Compare AI vs Human Scans"

on:
  workflow_dispatch: 
  workflow_run:
    workflows: ["General AI Multi-Language Scanner", "Human PR CodeQL Scanner"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  compare:
    name: Generate Comparison
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - uses: actions/checkout@v4

      - name: Get Latest Run Details
        id: runs
        run: |
          # Use filenames instead of display names to guarantee a match
          AI_DATA=$(gh run list --workflow "codeql-scan.yml" --status success --limit 1 --json databaseId,createdAt)
          HU_DATA=$(gh run list --workflow "human-codeql-scan.yml" --status success --limit 1 --json databaseId,createdAt)
          
          # Use .[0] to strictly grab the first object in the array
          AI_ID=$(echo "$AI_DATA" | jq -r '.[0].databaseId // "null"')
          AI_TIME=$(echo "$AI_DATA" | jq -r '.[0].createdAt // "null"')
          HU_ID=$(echo "$HU_DATA" | jq -r '.[0].databaseId // "null"')
          HU_TIME=$(echo "$HU_DATA" | jq -r '.[0].createdAt // "null"')

          echo "ai_run_id=$AI_ID" >> $GITHUB_OUTPUT
          echo "ai_time_utc=$AI_TIME" >> $GITHUB_OUTPUT
          echo "hu_run_id=$HU_ID" >> $GITHUB_OUTPUT
          echo "hu_time_utc=$HU_TIME" >> $GITHUB_OUTPUT

          echo "--- DEBUG RAW DATA ---"
          echo "AI ID: $AI_ID | Time: $AI_TIME"
          echo "HU ID: $HU_ID | Time: $HU_TIME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download All Results
        run: |
          mkdir -p ai-results human-results
          # Only attempt download if we have a valid ID
          if [ "${{ steps.runs.outputs.ai_run_id }}" != "null" ]; then
            gh run download ${{ steps.runs.outputs.ai_run_id }} -D ai-results || true
          fi
          if [ "${{ steps.runs.outputs.hu_run_id }}" != "null" ]; then
            gh run download ${{ steps.runs.outputs.hu_run_id }} -D human-results || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Comparison Dashboard
        env:
          AI_TIME_STR: ${{ steps.runs.outputs.ai_time_utc }}
          HU_TIME_STR: ${{ steps.runs.outputs.hu_time_utc }}
        run: |
          pip install pytz
          python3 -c "
          import json, os, pytz
          from datetime import datetime

          def to_ct(iso_str):
              iso_str = str(iso_str).strip()
              if not iso_str or iso_str in ['None', 'null', '']: 
                  return 'No Run Found'
              try:
                  # Expected: 2024-05-04T07:47:59Z
                  utc_dt = datetime.strptime(iso_str.replace('Z', '+0000'), '%Y-%m-%dT%H:%M:%S%z')
                  ct_tz = pytz.timezone('US/Central')
                  return utc_dt.astimezone(ct_tz).strftime('%Y-%m-%d %I:%M:%S %p CT')
              except Exception as e:
                  return f'Time Format Error ({iso_str})'

          def get_stats(root_dir):
              total_prs, total_issues = 0, 0
              sevs = {'error': 0, 'warning': 0, 'note': 0}
              for root, dirs, files in os.walk(root_dir):
                  for file in files:
                      if file.endswith('.sarif') and file != 'results.sarif':
                          try:
                              with open(os.path.join(root, file)) as s:
                                  data = json.load(s)
                                  runs = data.get('runs', [])
                                  if not runs: continue
                                  total_prs += 1
                                  for run in runs:
                                      res = run.get('results', [])
                                      total_issues += len(res)
                                      for r in res:
                                          lv = r.get('level', 'warning')
                                          sevs[lv] = sevs.get(lv, 0) + 1
                          except: continue
              return total_prs, total_issues, sevs

          ai_prs, ai_issues, ai_sevs = get_stats('ai-results')
          hu_prs, hu_issues, hu_sevs = get_stats('human-results')

          ai_time_ct = to_ct(os.environ.get('AI_TIME_STR'))
          hu_time_ct = to_ct(os.environ.get('HU_TIME_STR'))

          def dens(iss, prs): return round(iss/prs, 2) if prs > 0 else 0
          ai_d, hu_d = dens(ai_issues, ai_prs), dens(hu_issues, hu_prs)

          print('# ⚖️ AI vs. Human Vulnerability Comparison')
          print(f'\n### 🕒 Data Freshness (Central Time)')
          print(f'- **AI Scan Last Run:** `{ai_time_ct}`')
          print(f'- **Human Scan Last Run:** `{hu_time_ct}`')

          print('\n### 📊 Executive Metrics')
          print(f'| Metric | AI-Generated | Human-Written | Status |')
          print(f'| :--- | :--- | :--- | :--- |')
          print(f'| **Total PRs Found** | {ai_prs} | {hu_prs} | - |')
          print(f'| **Total Issues Found** | {ai_issues} | {hu_issues} | - |')
          status = '⚠️ AI density is higher' if ai_d > hu_d else '✅ AI density is lower'
          print(f'| **Density** | **{ai_d}** issues/PR | **{hu_d}** issues/PR | {status} |')

          print('\n### 🔴 Severity Breakdown')
          print(f'| Severity | AI Count | Human Count |')
          print(f'| :--- | :--- | :--- |')
          print(f'| High (Error) | {ai_sevs.get(\"error\", 0)} | {hu_sevs.get(\"error\", 0)} |')
          print(f'| Medium (Warning) | {ai_sevs.get(\"warning\", 0)} | {hu_sevs.get(\"warning\", 0)} |')
          " >> $GITHUB_STEP_SUMMARY
