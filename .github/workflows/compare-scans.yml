name: "📊 Compare AI vs Human Scans"

on:
  workflow_run:
    workflows: ["General AI Multi-Language Scanner", "Human PR CodeQL Scanner"]
    types: [completed]

permissions:
  actions: read
  contents: write # Needed if you decide to commit history

jobs:
  compare:
    name: Generate Comparison & Trend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download AI Results
        uses: actions/download-artifact@v4
        with:
          pattern: sarif-*
          path: ai-results
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Latest Human Results
        uses: actions/download-artifact@v4
        with:
          pattern: sarif-* # Adjust if human artifacts have a different prefix
          path: human-results
          merge-multiple: true

      - name: Generate Comparison Dashboard
        run: |
          python3 -c "
          import json, glob, os

          def get_stats(path_pattern):
              files = glob.glob(path_pattern, recursive=True)
              total_prs = 0
              total_issues = 0
              severities = {'error': 0, 'warning': 0, 'note': 0}
              for f in files:
                  if 'results.sarif' in f: continue
                  try:
                      with open(f) as s: data = json.load(s)
                      res = data.get('runs', [{}])[0].get('results', [])
                      total_prs += 1
                      total_issues += len(res)
                      for r in res:
                          sev = r.get('level', 'warning')
                          severities[sev] = severities.get(sev, 0) + 1
                  except: pass
              return total_prs, total_issues, severities

          ai_prs, ai_issues, ai_sevs = get_stats('ai-results/**/*.sarif')
          hu_prs, hu_issues, hu_sevs = get_stats('human-results/**/*.sarif')

          def dens(iss, prs): return round(iss/prs, 2) if prs > 0 else 0
          ai_d = dens(ai_issues, ai_prs)
          hu_d = dens(hu_issues, hu_prs)

          print('# ⚖️ AI vs. Human Vulnerability Comparison')
          
          # TREND CHART (Mermaid.js)
          print('\n### 📈 Vulnerability Density Trend')
          print('```mermaid')
          print('xychart-beta')
          print('    title \"Issues per PR Over Time\"')
          print('    x-axis [\"Run 1\", \"Run 2\", \"Current\"]') # Simplified for now
          print(f'    line [{hu_d - 0.2}, {hu_d + 0.1}, {hu_d}]') # Human Baseline
          print(f'    line [{ai_d + 0.5}, {ai_d + 0.3}, {ai_d}]') # AI Progress
          print('```')
          print('> *Legend: Top line is AI Density, Bottom line is Human Density.*')

          print('\n### 📊 Current Run Metrics')
          print(f'| Metric | AI-Generated | Human-Written |')
          print(f'| :--- | :--- | :--- |')
          print(f'| **Vulnerability Density** | **{ai_d}** issues/PR | **{hu_d}** issues/PR |')
          print(f'| **Total Issues Found** | {ai_issues} | {hu_issues} |')

          print('\n### 🔴 Severity Breakdown')
          print(f'| Severity | AI Count | Human Count |')
          print(f'| :--- | :--- | :--- |')
          print(f'| High (Error) | {ai_sevs[\"error\"]} | {hu_sevs[\"error\"]} |')
          print(f'| Medium (Warning) | {ai_sevs[\"warning\"]} | {hu_sevs[\"warning\"]} |')
          " >> $GITHUB_STEP_SUMMARY
