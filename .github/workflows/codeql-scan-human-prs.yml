name: "Manual Human AIDev Data Extraction"

on:
  workflow_dispatch: # Enables the "Run workflow" button in GitHub Actions

permissions:
  contents: write # Required to commit the CSV file back to the repo

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Data Science Dependencies
        run: |
          pip install pandas pyarrow fastparquet huggingface_hub

      - name: Run Extraction Script
        # Pointing to your new human PR extraction script
        run: python scripts/extract_aidev_human_prs.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Updated to check for human_scan_list.csv
          if [ -f "human_scan_list.csv" ]; then
            git add human_scan_list.csv
            git commit -m "Update Human AIDev scan list [on-demand]" || echo "No changes to commit"
            git push
          else
            echo "Error: human_scan_list.csv was not generated."
            exit 1
          fi
