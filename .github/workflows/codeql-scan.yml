name: "General AI Multi-Language Scanner"
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: read
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix_data }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          pip install pandas
          python scripts/ai-scanner.py
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}

  analyze:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '' && fromJson(needs.discover.outputs.matrix).include != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: PR Checkout
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
          GIT_LFS_SKIP_SMUDGE: 1
        run: |
          mkdir -p /tmp/scripts && cp scripts/* /tmp/scripts/
          rm -rf ./* && gh pr checkout ${{ matrix.pr_num }} --repo ${{ matrix.repo_name }}
          mkdir -p scripts && cp /tmp/scripts/* scripts/
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          output: sarif-results
          upload: false
      - name: Local Report
        run: |
          cp sarif-results/*.sarif ./results.sarif
          cp sarif-results/*.sarif ./${{ matrix.category_name }}.sarif
          python scripts/parse-results.py
      - uses: actions/upload-artifact@v4
        with:
          name: sarif-${{ matrix.category_name }}
          path: "*.sarif"

  report:
    needs: analyze
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: sarif-*
          path: all-results
          merge-multiple: true
      - name: Global Summary
        run: |
          echo "# 📊 Global Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | PR | AI Tool | Lang | 🔴 H | 🟡 M | 🔵 L | Total (Files) |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json, glob, os
          for f in sorted(glob.glob('all-results/*.sarif')):
              fname = os.path.basename(f)
              if fname == 'results.sarif': continue
              parts = fname.replace('.sarif', '').split('--')
              repo, pr, lang, agent = parts[0].replace('_SLASH_', '/'), parts[1], parts[2], parts[3].replace('_', ' ')
              with open(f) as s: data = json.load(s)
              res = data.get('runs', [{}])[0].get('results', [])
              h = sum(1 for r in res if r.get('level') == 'error')
              m = sum(1 for r in res if r.get('level', 'warning') == 'warning')
              l = sum(1 for r in res if r.get('level') == 'note')
              u = len(set(loc.get('physicalLocation', {}).get('artifactLocation', {}).get('uri') for r in res for loc in r.get('locations', [])))
              print(f'| {repo} | [#{pr}](https://github.com{repo}/pull/{pr}) | {agent} | {lang} | {h} | {m} | {l} | {len(res)} ({u}) |')
          " >> $GITHUB_STEP_SUMMARY
