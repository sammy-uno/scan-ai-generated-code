name: "Server-side CodeQL Scanner"

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      security-events: write

    steps:
      - name: Checkout Orchestrator
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run PR Orchestration and Detect Languages
        id: detect # We give this step an ID to reference its output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ./scripts/ai-scanner.py

      - name: Initialize CodeQL
        # This step only runs if languages were actually detected
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ steps.detect.outputs.detected_langs }}

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/analyze@v3
