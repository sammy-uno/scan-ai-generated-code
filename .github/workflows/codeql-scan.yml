name: "General AI Multi-Language Scanner"

on:
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  discover:
    name: Find AI PRs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix_data }}
    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Discover PRs
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
        run: |
          export GH_TOKEN=${{ secrets.GLOBAL_SCAN_PAT }}
          python scripts/ai-scanner.py

  analyze:
    name: Scan ${{ matrix.repo_name }} (${{ matrix.language }})
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '' && fromJson(needs.discover.outputs.matrix).include != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    
    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v4

      - name: Setup Runner Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare Workspace and Checkout PR
        id: pr_checkout
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
        run: |
          # 1. Back up scripts to a safe place outside the workspace
          mkdir -p /tmp/tooling_scripts
          cp -r scripts/* /tmp/tooling_scripts/
          
          # 2. Clean everything in the workspace
          rm -rf ./*
          
          # 3. Checkout the target PR
          gh pr checkout ${{ matrix.pr_num }} --repo ${{ matrix.repo_name }}
          
          # 4. Restore the scripts folder so the next steps can use it
          mkdir -p scripts
          cp -r /tmp/tooling_scripts/* scripts/
          
          echo "pr_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "pr_ref=refs/pull/${{ matrix.pr_num }}/head" >> $GITHUB_OUTPUT

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ (matrix.language == 'java' || matrix.language == 'csharp' || matrix.language == 'cpp') && 'autobuild' || 'none' }}
          source-root: .
          token: ${{ secrets.GLOBAL_SCAN_PAT }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/pr:${{ matrix.category_name }}"
          output: sarif-results
          sha: ${{ steps.pr_checkout.outputs.pr_sha }}
          ref: ${{ steps.pr_checkout.outputs.pr_ref }}
          token: ${{ secrets.GLOBAL_SCAN_PAT }}
          upload: false 

      - name: Create Summary
        if: always()
        run: |
          echo "## 🛡️ Scan Summary for ${{ matrix.repo_name }} #${{ matrix.pr_num }}" >> $GITHUB_STEP_SUMMARY
          
          # Align the file name for the script
          if [ -d "sarif-results" ]; then
            mv sarif-results/*.sarif ./results.sarif 2>/dev/null || true
          fi

          if [ -f "results.sarif" ]; then
            # The script is now safely restored in scripts/
            python scripts/parse-results.py
          else
            echo "❌ No SARIF results found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Save SARIF as Workflow Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-${{ matrix.category_name }}
          path: results.sarif
