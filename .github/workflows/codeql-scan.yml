name: "Global AI Agent Scanner"

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' # Optional: Run daily to find new AI PRs

jobs:
  analyze:
    name: Multi-Agent Java Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write 
      pull-requests: read

    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Orchestrate Agent Search
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ./scripts/ai-scanner.py

      - name: Initialize CodeQL
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ steps.detect.outputs.detected_langs }}
          build-mode: none 

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ steps.detect.outputs.detected_langs }}"
