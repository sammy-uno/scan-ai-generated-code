name: "Direct Java PR Scanner"

on:
  workflow_dispatch: # Manually trigger this test

jobs:
  analyze:
    name: No-Build Java Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
      contents: read

    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Stage Test PR
        id: detect
        env:
          # Use your PAT secret here for public repo access
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }} 
        run: python ./scripts/ai-scanner.py
        
      - name: Initialize CodeQL
        if: steps.detect.outputs.detected_langs != ''
        uses: [github/codeql-action/init@v3](https://github.com)
        with:
          languages: ${{ steps.detect.outputs.detected_langs }}
          # Essential for scanning third-party Java without Maven/Gradle setup
          build-mode: none 

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.detected_langs != ''
        uses: [github/codeql-action/analyze@v3](https://github.com)
        with:
          category: "/language:java"
