name: "Global AI Agent Java Scanner"

on:
  workflow_dispatch: 

jobs:
  analyze:
    name: No-Build AI Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
      contents: read

    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Global Search
        id: detect
        env:
          # Use your PAT secret here for global search permissions
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }} 
        run: python ./scripts/ai-scanner.py

      - name: Initialize CodeQL
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ steps.detect.outputs.detected_langs }}
          # Scan Java statically to avoid complex build configurations
          build-mode: none 

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
