nname: "AI CodeQL Scanner"
on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  analyze:
    name: PR Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write 
      pull-requests: read

    steps:
      - name: Checkout Repository
        uses: [actions/checkout@v4](https://docs.github.com/articles/getting-started-with-github-actions)
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Orchestration and Language Detection
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ./scripts/ai-scanner.py

      - name: Initialize CodeQL
        if: steps.detect.outputs.detected_langs != ''
        uses: [github/codeql-action/init@v3](https://docs.github.com/actions/using-workflows/workflow-syntax-for-github-actions)
        with:
          languages: ${{ steps.detect.outputs.detected_langs }}
          # Removed build-mode: none to allow compilation tracking

      # This step is CRITICAL for Java/Kotlin to be visible to CodeQL
      - name: Autobuild
        if: steps.detect.outputs.detected_langs != ''
        uses: [github/codeql-action/autobuild@v3](https://github.com/github/codeql-action)

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ steps.detect.outputs.detected_langs }}"

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ steps.detect.outputs.detected_langs }}"
