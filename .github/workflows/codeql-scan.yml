name: "Direct Java PR Scanner"

on:
  workflow_dispatch: 

jobs:
  analyze:
    name: No-Build Java Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
      contents: read

    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Stage Test PR
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }} 
        run: python ./scripts/ai-scanner.py

      - name: Initialize CodeQL
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ steps.detect.outputs.detected_langs }}
          # Scan Java without requiring a build/compiler
          build-mode: none 

      # CRITICAL: We move the Git pointer to YOUR repo's SHA 
      # so the upload works, but we don't 'checkout' so the 
      # RocketMQ Java files remain on the disk for scanning.
      - name: Reset Git Metadata for Upload
        if: steps.detect.outputs.detected_langs != ''
        run: |
          git update-ref HEAD ${{ github.sha }}
          echo "Git HEAD updated to ${{ github.sha }} to enable upload."

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
          # Ensure results are associated with your branch
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
