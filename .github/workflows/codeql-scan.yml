name: "AI CodeQL Scanner"

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggering if needed

jobs:
  analyze:
    name: PR Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # Required to post results to the Security/PR tab
      pull-requests: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetches all history so the script can compare the PR to the base branch
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Orchestration and Language Detection
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # This calls your renamed script
        run: python ./scripts/ai-scanner.py

      - name: Initialize CodeQL
        # Only initializes if the script found relevant changed files
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ steps.detect.outputs.detected_langs }}
          # Ensures we focus on the code changes
          build-mode: none 

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ steps.detect.outputs.detected_langs }}"
