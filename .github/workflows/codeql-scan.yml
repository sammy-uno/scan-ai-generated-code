name: "General AI Multi-Language Scanner"

on:
  workflow_dispatch: 

jobs:
  discover:
    name: Find AI PRs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix_data }}
    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Auth Status
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
        run: |
          echo "### 🔐 GitHub CLI Auth Status" >> $GITHUB_STEP_SUMMARY
          # Check which account and scopes are active
          gh auth status >> $GITHUB_STEP_SUMMARY 2>&1 || true
          # Verify raw API scopes for the provided token
          echo -e "\n**Token Scopes Verified via API:**" >> $GITHUB_STEP_SUMMARY
          gh api -i /user | grep -i x-oauth-scopes >> $GITHUB_STEP_SUMMARY || true

      - name: Discover PRs
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
        run: |
          # Use export to ensure the 'gh' CLI inside the python script sees the token
          export GH_TOKEN=${{ secrets.GLOBAL_SCAN_PAT }}
          python scripts/ai-scanner.py

  analyze:
    name: Scan ${{ matrix.repo_name }} (${{ matrix.language }})
    needs: discover
    # Only run if the matrix found actual work to do
    if: ${{ needs.discover.outputs.matrix != '' && fromJson(needs.discover.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    
    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v4

      - name: Setup Runner Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare Workspace and Checkout PR
        id: pr_checkout
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
        run: |
          # Preserve .git and scripts/ for CLI and execution
          find . -maxdepth 1 ! -name '.git' ! -name 'scripts' ! -name '.' ! -name '..' -exec rm -rf {} +
          gh pr checkout ${{ matrix.pr_num }} --repo ${{ matrix.repo_name }}
          echo "pr_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "pr_ref=refs/pull/${{ matrix.pr_num }}/head" >> $GITHUB_OUTPUT

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Only use autobuild for specific compiled languages
          build-mode: ${{ (matrix.language == 'java' || matrix.language == 'csharp' || matrix.language == 'cpp') && 'autobuild' || 'none' }}
          source-root: .
          token: ${{ secrets.GLOBAL_SCAN_PAT }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/pr:${{ matrix.category_name }}"
          output: results.sarif
          sha: ${{ steps.pr_checkout.outputs.pr_sha }}
          ref: ${{ steps.pr_checkout.outputs.pr_ref }}
          token: ${{ secrets.GLOBAL_SCAN_PAT }}

      - name: Create Summary
        if: always()
        run: |
          echo "## 🛡️ Scan Summary for ${{ matrix.repo_name }} #${{ matrix.pr_num }}" >> $GITHUB_STEP_SUMMARY
          echo "**Language:** ${{ matrix.language }} | **Title:** ${{ matrix.pr_title }}" >> $GITHUB_STEP_SUMMARY
          python scripts/parse-results.py
