name: "Direct Java PR Scanner"

on:
  workflow_dispatch: 

jobs:
  analyze:
    name: No-Build Java Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
      contents: read

    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Stage Test PR
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }} 
        run: python ./scripts/ai-scanner.py

      - name: Initialize CodeQL
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ steps.detect.outputs.detected_langs }}
          build-mode: none 

      - name: Reset Git Metadata for Upload
        if: steps.detect.outputs.detected_langs != ''
        run: git update-ref HEAD ${{ github.sha }}

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/analyze@v3
        with:
          category: "/pr:${{ steps.detect.outputs.pr_name }}"
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          # This saves the results to a local file we can parse
          output: results.sarif

      - name: Create Workflow Summary
        if: always() && steps.detect.outputs.pr_name != ''
        run: |
          echo "### Directory Contents"
          pwd
          ls -R scripts/
          echo "## 🛡️ Scan Summary for ${{ steps.detect.outputs.full_title }}" >> $GITHUB_STEP_SUMMARY
          echo "Checked out code from: \`apache/rocketmq\`" >> $GITHUB_STEP_SUMMARY
          python scripts/parse-results.py
