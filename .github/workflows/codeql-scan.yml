name: "Targeted AI PR Scanner"

on:
  workflow_dispatch: 

jobs:
  analyze:
    name: Targeted Java Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
      contents: read

    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Stage PR and Create Config
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }} 
        run: |
          cp -r scripts /tmp/scripts_backup
          python scripts/ai-scanner.py
          cp -r /tmp/scripts_backup scripts

      - name: Initialize CodeQL
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ steps.detect.outputs.detected_langs }}
          build-mode: none
          # Point to the dynamic config file created by ai-scanner.py
          config-file: ./codeql-config.yml

      - name: Reset Git Metadata
        if: steps.detect.outputs.detected_langs != ''
        run: git update-ref HEAD ${{ github.sha }}

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.detected_langs != ''
        uses: github/codeql-action/analyze@v3
        with:
          category: "/pr:${{ steps.detect.outputs.pr_name }}"
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          output: results.sarif

      - name: Create Workflow Summary
        if: always() && steps.detect.outputs.pr_name != ''
        run: python scripts/parse-results.py
