name: "General AI Multi-Language Scanner"

on:
  workflow_dispatch: 

# Opt-in to Node.js 24 runtime to resolve deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  discover:
    name: Find AI PRs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix_data }}
    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Discover PRs
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
        run: |
          export GH_TOKEN=${{ secrets.GLOBAL_SCAN_PAT }}
          python scripts/ai-scanner.py

  analyze:
    name: Scan ${{ matrix.repo_name }} (${{ matrix.language }})
    needs: discover
    # Only run if discovery found matching PRs
    if: ${{ needs.discover.outputs.matrix != '' && fromJson(needs.discover.outputs.matrix).include != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    
    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v5

      - name: Setup Runner Environment
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare Workspace and Checkout PR
        id: pr_checkout
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
        run: |
          # 1. Back up scripts to /tmp
          mkdir -p /tmp/tooling_scripts
          cp -r scripts/* /tmp/tooling_scripts/
          
          # 2. Clean workspace
          rm -rf ./*
          
          # 3. Checkout target PR
          gh pr checkout ${{ matrix.pr_num }} --repo ${{ matrix.repo_name }}
          
          # 4. Restore scripts
          mkdir -p scripts
          cp -r /tmp/tooling_scripts/* scripts/
          
          echo "pr_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "pr_ref=refs/pull/${{ matrix.pr_num }}/head" >> $GITHUB_OUTPUT

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Java uses 'none', Go/C#/C++ use 'autobuild'
          build-mode: ${{ (matrix.language == 'csharp' || matrix.language == 'cpp' || matrix.language == 'go') && 'autobuild' || 'none' }}
          source-root: .
          token: ${{ secrets.GLOBAL_SCAN_PAT }}
          # Uses the JSON list from the matrix to target specific directories
          config: |
            paths: ${{ matrix.scan_paths }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/pr:${{ matrix.category_name }}"
          output: sarif-results
          sha: ${{ steps.pr_checkout.outputs.pr_sha }}
          ref: ${{ steps.pr_checkout.outputs.pr_ref }}
          token: ${{ secrets.GLOBAL_SCAN_PAT }}
          upload: false 

      - name: Create Summary
        if: always()
        run: |
          echo "## 🛡️ Scan Summary for ${{ matrix.repo_name }} #${{ matrix.pr_num }}" >> $GITHUB_STEP_SUMMARY
          echo "**Language:** ${{ matrix.language }} | **Title:** ${{ matrix.pr_title }}" >> $GITHUB_STEP_SUMMARY
          
          # Move language-specific SARIF results into place for the parser
          if [ -d "sarif-results" ]; then
            mv sarif-results/*.sarif ./results.sarif 2>/dev/null || true
          fi

          if [ -f "results.sarif" ]; then
            python scripts/parse-results.py
          else
            echo "⚠️ No security issues found or code was outside of scan paths." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Save SARIF as Workflow Artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sarif-${{ matrix.category_name }}
          path: results.sarif
          if-no-files-found: warn
