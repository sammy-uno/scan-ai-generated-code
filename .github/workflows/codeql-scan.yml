name: "General AI Multi-Language Scanner"

on:
  workflow_dispatch: 

# Opt-in to Node.js 24 runtime to resolve deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  discover:
    name: Find AI PRs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix_data }}
    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Discover PRs
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
        run: |
          export GH_TOKEN=${{ secrets.GLOBAL_SCAN_PAT }}
          python scripts/ai-scanner.py

  analyze:
    name: Scan ${{ matrix.repo_name }} (${{ matrix.language }})
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '' && fromJson(needs.discover.outputs.matrix).include != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    
    steps:
      - name: Checkout Tooling Repo
        uses: actions/checkout@v5

      - name: Setup Runner Environment
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare Workspace and Checkout PR
        id: pr_checkout
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
          GIT_LFS_SKIP_SMUDGE: 1
        run: |
          mkdir -p /tmp/tooling_scripts
          cp -r scripts/* /tmp/tooling_scripts/
          rm -rf ./*
          gh pr checkout ${{ matrix.pr_num }} --repo ${{ matrix.repo_name }}
          mkdir -p scripts
          cp -r /tmp/tooling_scripts/* scripts/
          echo "pr_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "pr_ref=refs/pull/${{ matrix.pr_num }}/head" >> $GITHUB_OUTPUT

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # All selected languages (Java, Python, JS, Ruby) support build-mode: none
          build-mode: none
          source-root: .
          token: ${{ secrets.GLOBAL_SCAN_PAT }}
          config: |
            paths: ${{ matrix.scan_paths }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: "/pr:${{ matrix.category_name }}"
          output: sarif-results
          sha: ${{ steps.pr_checkout.outputs.pr_sha }}
          ref: ${{ steps.pr_checkout.outputs.pr_ref }}
          token: ${{ secrets.GLOBAL_SCAN_PAT }}
          upload: false 

      - name: Create Summary
        if: always()
        run: |
          echo "## 🛡️ Scan Summary for ${{ matrix.repo_name }} #${{ matrix.pr_num }}" >> $GITHUB_STEP_SUMMARY
          if [ -d "sarif-results" ]; then
            mv sarif-results/*.sarif ./results.sarif 2>/dev/null || true
          fi
          if [ -f "results.sarif" ]; then
            python scripts/parse-results.py
          else
            echo "⚠️ No results generated for this job." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Save SARIF as Workflow Artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sarif-${{ matrix.category_name }}
          path: results.sarif
          if-no-files-found: warn

  report:
    name: Consolidate Final Report
    needs: analyze
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all SARIF Artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: sarif-*
          path: all-results
          merge-multiple: true

      - name: Generate Consolidated Summary
        run: |
          echo "# 📊 Global Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Repository & Language | 🔴 High | 🟡 Medium | Total |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: | :---: | :---: |" >> $GITHUB_STEP_SUMMARY
          
          python3 -c "
          import json, glob, os, sys
          
          # Recursive search to find files regardless of sub-directory nesting
          files = sorted(glob.glob('all-results/**/*.sarif', recursive=True))
          
          if not files:
              print('| No SARIF results found | - | - | - |')
          
          for f in files:
              try:
                  with open(f, 'r') as s:
                      data = json.load(s)
                  
                  # Standard SARIF path to results
                  results = data.get('runs', [{}])[0].get('results', [])
                  high = sum(1 for r in results if r.get('level') == 'error')
                  med = sum(1 for r in results if r.get('level') == 'warning')
                  total = len(results)
                  
                  # Clean display name from path/filename
                  display_name = os.path.basename(f).replace('sarif-', '').replace('.sarif', '')
                  print(f'| {display_name} | {high} | {med} | {total} |')
              except Exception as e:
                  print(f'| Error parsing {os.path.basename(f)} | - | - | - |', file=sys.stderr)
          " >> $GITHUB_STEP_SUMMARY

      - name: Upload Merged Final Results
        uses: actions/upload-artifact@v6
        with:
          name: final-consolidated-report
          path: all-results/
